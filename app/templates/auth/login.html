{% extends 'base.html' %}

{% block title %}Sign In — VPS Panel{% endblock %}

{% block layout %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-icon-lg">
                <i class="bi bi-hdd-rack-fill" style="color:white;"></i>
            </div>
            <h2>VPS Panel</h2>
            <p class="login-subtitle">Secure Server Management</p>
        </div>

        <form action="{{ url_for('auth.login_submit') }}" method="POST" autocomplete="off">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:rgba(0,0,0,0.25);border:1px solid var(--border-default);color:var(--text-dim);">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:rgba(0,0,0,0.25);border:1px solid var(--border-default);color:var(--text-dim);">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i>&nbsp; Sign In
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;">
            <small style="color:var(--text-dim);font-size:0.72rem;">
                VPS Panel v{{ config.get('PANEL_VERSION', '2.0.0') }} &bull; Secure Access Only
            </small>
        </div>
    </div>
</div>
{% endblock %}
