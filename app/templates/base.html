<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VPS Panel — Lightweight Server Management">
    <title>{% block title %}VPS Panel{% endblock %}</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Theme -->
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="ambient-bg"></div>

    {% block layout %}{% endblock %}

    <!-- Flash Messages (converted to toasts by JS) -->
    <div id="flashMessages" style="display:none;">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <span data-flash="{{ message }}" data-type="{{ category }}"></span>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Panel JS -->
    <!-- Panel JS -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('input.pwd-gen').forEach(input => {
            const wrapper = document.createElement('div');
            wrapper.className = 'input-group';
            input.parentNode.insertBefore(wrapper, input);
            wrapper.appendChild(input);
            
            const genBtn = document.createElement('button');
            genBtn.type = 'button';
            genBtn.className = 'btn btn-outline-secondary border-secondary bg-dark text-secondary';
            genBtn.innerHTML = '<i class="bi bi-dice-5"></i>';
            genBtn.title = 'Generate Random Password';
            
            const eyeBtn = document.createElement('button');
            eyeBtn.type = 'button';
            eyeBtn.className = 'btn btn-outline-secondary border-secondary bg-dark text-secondary';
            eyeBtn.innerHTML = '<i class="bi bi-eye"></i>';
            eyeBtn.title = 'View Password';

            wrapper.appendChild(genBtn);
            wrapper.appendChild(eyeBtn);

            genBtn.addEventListener('click', () => {
                const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
                let pwd = "";
                const array = new Uint32Array(16);
                window.crypto.getRandomValues(array);
                for (let i = 0; i < array.length; i++) {
                    pwd += chars[array[i] % chars.length];
                }
                input.value = pwd;
                input.type = 'text';
                eyeBtn.innerHTML = '<i class="bi bi-eye-slash text-white"></i>';
            });

            eyeBtn.addEventListener('click', () => {
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeBtn.innerHTML = '<i class="bi bi-eye-slash text-white"></i>';
                } else {
                    input.type = 'password';
                    eyeBtn.innerHTML = '<i class="bi bi-eye"></i>';
                }
            });
        });
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
