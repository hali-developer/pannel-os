# Apache reverse proxy configuration for VPS Panel
# Copy to /etc/apache2/sites-available/vps-panel.conf
# a2ensite vps-panel.conf

<VirtualHost *:8080>
    ServerName _

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"

    # Proxy to Gunicorn
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Serve static files directly
    Alias /static /opt/pannel/static
    <Directory /opt/pannel/static>
        Require all granted
        Options -Indexes
        AllowOverride None
    </Directory>

    # Block hidden files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/panel_error.log
    CustomLog ${APACHE_LOG_DIR}/panel_access.log combined

    # Needed for HTTP/1.1 proxying
    SetEnv proxy-nokeepalive 1
</VirtualHost>

# Ensure Apache is listening on port 8080
Listen 8080
