# Apache SSL configuration for VPS Panel
# Copy to /etc/apache2/sites-available/vps-panel-ssl.conf
# a2ensite vps-panel-ssl.conf

<VirtualHost *:443>
    ServerName _
    
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    # Include hardened SSL parameters
    Include /etc/apache2/conf-available/ssl-params.conf

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"

    # Proxy to Gunicorn
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Serve static files directly
    Alias /static /var/www/pannel/static
    <Directory /var/www/pannel/static>
        Require all granted
        Options -Indexes
        AllowOverride None
    </Directory>

    # Block hidden files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/panel_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/panel_ssl_access.log combined

    # Needed for HTTP/1.1 proxying
    SetEnv proxy-nokeepalive 1
</VirtualHost>
